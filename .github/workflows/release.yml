name: Release plugin archives

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
          - { os: linux, arch: amd64 }
          - { os: linux, arch: arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Package
        run: ./scripts/package-opentofu-plugin.sh "${{ matrix.target.os }}" "${{ matrix.target.arch }}" "${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: opentofu-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: dist/*

  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag

